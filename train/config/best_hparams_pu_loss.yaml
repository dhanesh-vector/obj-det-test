data_dir: /projects/tenomix/ml-share/training/07/data
model_size: s
num_classes: 1
batch_size: 32
epochs: 100
learning_rate: 0.00043284502212938834
weight_decay: 0.007969454818643935
num_workers: 8
use_pu_loss: true
device: cuda
early_stopping_patience: 20
early_stopping_min_delta: 0.001
label_smooth: 0.0
slice_stride: 5
mosaic_prob: 0.0
augmentations:
- HorizontalFlip:
    p: 0.5
- VerticalFlip:
    p: 0.5
- RandomBrightnessContrast:
    brightness_limit: 0.1
    contrast_limit: 0.1
    p: 0.3
- GaussianBlur:
    blur_limit:
    - 3
    - 7
    p: 0.3
- GaussNoise:
    std_range:
    - 0.01
    - 0.05
    p: 0.4
- CLAHE:
    clip_limit: 2.0
    tile_grid_size:
    - 8
    - 8
    p: 0.4
- ShiftScaleRotate:
    shift_limit: 0.08
    scale_limit: 0.2
    rotate_limit: 15
    p: 0.4
